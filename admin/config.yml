# ============================================================
#  SUPER RESELLS — admin dashboard config (Decap CMS)
#  This powers the dashboard at /admin where the store is managed.
#  Hosted on Cloudflare Pages (super-resells.pages.dev), auto-deploys
#  from this GitHub repo's "main" branch.
# ============================================================
backend:
  name: github               # log in with a GitHub Personal Access Token
  repo: superresells/super-resells
  branch: main

# Where uploaded photos are saved + how the site references them.
media_folder: "images/p"
public_folder: "/images/p"

# Friendlier editor experience
publish_mode: simple
site_url: https://super-resells.pages.dev
display_url: https://super-resells.pages.dev
logo_url: https://super-resells.pages.dev/images/social-card.svg

collections:
  # -------- PRODUCTS --------
  - name: shop
    label: "🛍️  Shop Products"
    description: "Add, edit, or delete products. Drop sold-out sizes."
    files:
      - name: products
        label: "All Products"
        file: "data/products.json"
        format: json
        fields:
          - name: items
            label: "Products"
            label_singular: "Product"
            widget: list
            collapsed: true
            summary: "{{fields.name}}  ·  ${{fields.price}}  ·  {{fields.cat}}  ·  {{fields.sizes}}"
            fields:
              - { name: name, label: "Title / Name", widget: string }
              - { name: id, label: "ID (auto-generated)", widget: uuid, prefix: "hs-" }
              - { name: price, label: "Price ($)", widget: number, default: 50, value_type: int, min: 1 }
              - { name: cat, label: "Color", widget: select, options: ["Black", "White", "Grey", "Blue", "Red", "Green", "Purple", "Pink", "Tan", "Brown", "Multi"], default: "Black", hint: "Drives the color filter on the shop page. Pick the closest." }
              - { name: badge, label: "Badge", widget: select, required: false, default: "", options: ["", "Just Dropped", "Best Seller", "Last One", "Limited"] }
              - { name: sizes, label: "Sizes IN STOCK", widget: select, multiple: true, default: ["M"], options: ["S", "M", "L", "XL", "2XL", "One Size"], hint: "Uncheck a size the moment it sells out." }
              - { name: img, label: "Front photo", widget: image, required: false, choose_url: false, hint: "Front of the shirt. Any size — phone photos are fine; it's shown cropped to a tall card and auto-optimized to WebP." }
              - { name: back, label: "Back photo (shows on hover)", widget: image, required: false, choose_url: false, hint: "Optional. Appears when a shopper hovers over the card on the shop page." }
              - { name: colors, label: "Print description", widget: string, required: false, hint: "e.g. Black · Pink print" }
              - { name: desc, label: "Description", widget: text, required: false }

  # -------- REVIEWS --------
  - name: reviews
    label: "⭐  Reviews"
    description: "Customer reviews get emailed to you first — add the good ones here to publish them."
    files:
      - name: reviews
        label: "Published Reviews"
        file: "data/reviews.json"
        format: json
        fields:
          - name: items
            label: "Reviews"
            label_singular: "Review"
            widget: list
            collapsed: true
            summary: "{{fields.who}} — {{fields.stars}}★"
            fields:
              - { name: stars, label: "Stars (1–5)", widget: number, default: 5, value_type: int, min: 1, max: 5 }
              - { name: who, label: "Name", widget: string }
              - { name: where, label: "Location (optional)", widget: string, required: false }
              - { name: text, label: "Review", widget: text }

  # -------- SOLD WALL --------
  - name: sold
    label: "🔥  Sold-Out Wall"
    description: "When a piece sells, delete it from Products and add it here to show on 'Recently Copped'."
    files:
      - name: sold
        label: "Recently Sold"
        file: "data/sold.json"
        format: json
        fields:
          - name: items
            label: "Sold pieces"
            label_singular: "Sold piece"
            widget: list
            collapsed: true
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: img, label: "Photo", widget: image, required: false, choose_url: false }

  # -------- STORE SETTINGS --------
  - name: settings
    label: "⚙️  Store Settings"
    description: "Change pricing, contact info, social handles, and homepage copy — no code. Hit Publish to go live."
    files:
      - name: settings
        label: "Settings"
        file: "data/settings.json"
        format: json
        fields:
          - name: pricing
            label: "Stack Pricing"
            widget: object
            fields:
              - { name: basePrice, label: "Single-piece price ($)", widget: number, value_type: int, min: 1, default: 50, hint: "What one shirt costs on its own." }
              - name: table
                label: "Quantity deals  (buy X → pay $Y total)"
                widget: list
                label_singular: "Price row"
                collapsed: false
                summary: "{{fields.qty}} for ${{fields.price}}"
                hint: "The whole 'X for $Y' deal sheet. In-between amounts fill in automatically."
                fields:
                  - { name: qty, label: "Quantity", widget: number, value_type: int, min: 1 }
                  - { name: price, label: "Total price ($)", widget: number, value_type: int, min: 1 }
          - name: contact
            label: "Contact / Orders"
            widget: object
            fields:
              - { name: orderEmail, label: "Order email", widget: string, hint: "Where order requests are sent + shown to customers." }
              - { name: orderPhone, label: "Phone (optional)", widget: string, required: false, hint: "Leave blank to hide it." }
              - { name: formspreeId, label: "Formspree form ID", widget: string, required: false, hint: "From formspree.io — powers the auto-emailed orders & contact form." }
          - name: social
            label: "Social handles"
            widget: object
            fields:
              - { name: instagram, label: "Instagram handle", widget: string, required: false, hint: "Just the handle, no @. Blank hides the icon." }
              - { name: tiktok, label: "TikTok handle", widget: string, required: false, hint: "Just the handle, no @. Blank hides the icon." }
          - name: copy
            label: "Homepage Copy"
            widget: object
            fields:
              - { name: heroEyebrow, label: "Hero tagline (small line above the big headline)", widget: string, required: false }
              - { name: heroLead, label: "Hero paragraph (under the headline)", widget: text, required: false }
